<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyrox Epicure — Résultats Athlète</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="stylesheet" href="./assets/css/admin-bootstrap.css" />
    <style>
      /* ── Page layout ───────────────────────────────────────────── */
      body { min-height: 100vh; }

      #hero {
        text-align: center;
        padding: 48px 24px 32px;
      }
      .hero-logo {
        font-size: 13px; font-family: var(--mono);
        letter-spacing: .2em; color: var(--muted);
        text-transform: uppercase; margin-bottom: 10px;
      }
      .hero-title {
        font-size: clamp(24px, 5vw, 42px);
        font-weight: 900; letter-spacing: .05em;
        color: var(--text); margin-bottom: 6px;
      }
      .hero-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

      /* ── Search box ─────────────────────────────────────────────── */
      #search-wrap {
        position: relative;
        max-width: 540px;
        margin: 0 auto 14px;
      }
      #search-input {
        width: 100%;
        padding: 16px 52px 16px 18px;
        font-size: 18px;
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        transition: border-color .2s, box-shadow .2s;
      }
      #search-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(198,255,0,.12);
      }
      #search-icon {
        position: absolute; right: 18px; top: 50%;
        transform: translateY(-50%);
        font-size: 20px; color: var(--muted); pointer-events: none;
      }

      /* Autocomplete dropdown */
      #autocomplete {
        position: absolute; left: 0; right: 0; top: 100%;
        margin-top: 4px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 10px; z-index: 100;
        max-height: 280px; overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,.4);
        display: none;
      }
      #autocomplete.open { display: block; }
      .ac-item {
        padding: 10px 16px;
        cursor: pointer;
        display: flex; align-items: center; gap: 10px;
        font-size: 14px;
        transition: background .1s;
        border-bottom: 1px solid var(--border);
      }
      .ac-item:last-child { border-bottom: none; }
      .ac-item:hover, .ac-item.focused { background: rgba(255,255,255,.05); }
      .ac-name { font-weight: 700; color: var(--text); flex: 1; }
      .ac-meta { font-size: 11px; font-family: var(--mono); color: var(--muted); }
      .ac-comp { font-size: 11px; color: var(--accent); font-family: var(--mono); }
      .ac-empty { padding: 14px 16px; color: var(--muted); font-size: 13px; text-align: center; }

      #search-status { font-size: 12px; font-family: var(--mono); color: var(--muted); text-align: center; }

      /* ── Results area ───────────────────────────────────────────── */
      #results { max-width: 860px; margin: 0 auto; padding: 0 16px 60px; }

      /* ── Athlete card ───────────────────────────────────────────── */
      .ath-card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: 16px; overflow: hidden;
        margin-bottom: 28px;
        animation: fadeUp .3s ease;
      }
      /* fadeIn → utilise @keyframes fadeUp de styles.css */

      .ath-card-head {
        padding: 20px 24px;
        background: rgba(255,255,255,.03);
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      }
      .ath-avatar {
        width: 52px; height: 52px; border-radius: 50%;
        background: var(--accent); color: #0A0A0A;
        font-weight: 900; font-size: 20px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; letter-spacing: .04em;
      }
      .ath-name-block { flex: 1; }
      .ath-last  { font-size: 24px; font-weight: 900; color: var(--text); letter-spacing: .05em; line-height: 1; }
      .ath-first { font-size: 15px; color: var(--text); margin-top: 2px; font-weight: 600; }
      .ath-badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      /* badges → utilise .cat-badge .cat-* depuis styles.css */
      .badge {
        font-family: var(--mono); font-size: 11px;
        padding: 3px 9px; border-radius: 20px; border: 1px solid transparent;
      }
      .badge-Open  { background: rgba(198,255,0,.12);   color: var(--accent); border-color: rgba(198,255,0,.3); }
      .badge-Pro   { background: rgba(248,113,113,.15); color: #F87171;  border-color: rgba(248,113,113,.3); }
      .badge-Femme { background: rgba(244,114,182,.1);  color: #F472B6;  border-color: rgba(244,114,182,.3); }
      .badge-Homme { background: rgba(96,165,250,.1);   color: #60A5FA;  border-color: rgba(96,165,250,.3); }
      .badge-comp  { background: rgba(198,255,0,.08);   color: var(--accent); border-color: rgba(198,255,0,.25); }

      /* ── Competition block ──────────────────────────────────────── */
      .comp-block { padding: 20px 24px; }
      .comp-head {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 18px; flex-wrap: wrap;
      }
      .comp-name { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
      .comp-date { font-size: 12px; font-family: var(--mono); color: var(--muted); }

      /* ── Rank podium ────────────────────────────────────────────── */
      .rank-podium {
        display: flex; align-items: center; gap: 14px;
        padding: 14px 18px;
        background: rgba(255,255,255,.03);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 18px;
      }
      .rank-medal { font-size: 32px; line-height: 1; }
      .rank-info { flex: 1; }
      .rank-label { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
      .rank-num { font-size: 38px; font-weight: 900; line-height: 1; }
      .rank-num.r1 { color: #FFD700; }
      .rank-num.r2 { color: #C0C0C0; }
      .rank-num.r3 { color: #CD7F32; }
      .rank-num.rN { color: var(--accent); }
      .rank-total { font-size: 12px; font-family: var(--mono); color: var(--muted); margin-top: 2px; }
      .rank-heat  { font-family: var(--mono); font-size: 13px; color: var(--accent); font-weight: 700; }

      /* ── Scores par épreuve ────────────────────────────────────── */
      .zone-scores { display: flex; flex-direction: column; gap: 10px; }
      .zone-row {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px;
        background: rgba(255,255,255,.02);
        border: 1px solid var(--border);
        border-radius: 8px;
        transition: border-color .2s;
      }
      .zone-row:hover { border-color: rgba(255,255,255,.1); }
      .zone-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
      .zone-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; min-width: 120px; }
      .zone-score-val {
        font-family: var(--mono); font-size: 15px; font-weight: 700;
        color: var(--text); min-width: 100px; text-align: right;
      }
      .zone-score-val.dnf { color: #F87171; }
      .zone-rank {
        font-family: var(--mono); font-size: 12px; font-weight: 700;
        min-width: 48px; text-align: center;
        padding: 3px 8px; border-radius: 20px;
        border: 1px solid rgba(255,255,255,.08);
        color: var(--muted);
      }
      .zone-rank.best  { background: rgba(198,255,0,.12); border-color: rgba(198,255,0,.3); color: var(--accent); }
      .zone-rank.r1    { background: rgba(255,215,0,.12); border-color: rgba(255,215,0,.4);  color: #FFD700; }
      .zone-rank.r2    { background: rgba(192,192,192,.1); border-color: rgba(192,192,192,.3); color: #C0C0C0; }
      .zone-rank.r3    { background: rgba(205,127,50,.1); border-color: rgba(205,127,50,.3); color: #CD7F32; }
      .zone-no-score   { font-size: 12px; color: var(--muted); font-style: italic; }

      /* Sub-values (Strength) */
      .zone-subvals {
        font-size: 11px; font-family: var(--mono); color: var(--muted);
        display: flex; gap: 8px; flex-wrap: wrap;
      }

      /* ── Progress bar (completions) ─────────────────────────────── */
      .completion-bar {
        display: flex; align-items: center; gap: 8px;
        margin-top: 14px; font-size: 12px;
        font-family: var(--mono); color: var(--muted);
      }
      .completion-dots { display: flex; gap: 5px; }
      .completion-dot  {
        width: 10px; height: 10px; border-radius: 50%;
        background: rgba(255,255,255,.12);
      }
      .completion-dot.done { background: var(--accent); }
      .completion-dot.dnf { background: #F87171; box-shadow: 0 0 0 1px rgba(248,113,113,.6); }

      .rank-podium-dnf {
        border-color: rgba(248,113,113,.32);
        background: rgba(248,113,113,.07);
      }
      .rank-medal--dnf {
        font-size: 28px;
        font-weight: 900;
        color: #F87171;
        font-family: var(--mono);
        letter-spacing: 0.12em;
      }
      .rank-num-dnf {
        color: #F87171 !important;
        font-size: 32px !important;
        letter-spacing: 0.08em;
      }
      .rank-dnf-note {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        line-height: 1.4;
        max-width: 42ch;
      }

      .rank-podium-hyrox {
        border-color: rgba(198,255,0,.28);
        background: rgba(198,255,0,.06);
      }
      .rank-num-hyrox {
        color: var(--accent) !important;
        font-size: 36px !important;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
      }
      .rank-hyrox-hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        line-height: 1.4;
        max-width: 48ch;
      }
      .club-progress-note {
        font-size: 11px;
        color: var(--muted);
        margin: 10px 0 4px;
        line-height: 1.45;
        max-width: 52ch;
      }

      /* ── No result / Loader → utilise .empty-state, .spinner de styles.css ── */
      .empty-state { padding: 60px 24px; font-size: 14px; }
      .empty-icon  { font-size: 48px; margin-bottom: 12px; }

      .loader {
        text-align: center; padding: 40px;
        font-family: var(--mono); font-size: 13px; color: var(--muted);
      }
      .loader .spinner { width: 24px; height: 24px; border-width: 3px; margin-right: 10px; }

      /* ── Détail parcours Hyrox (segments + Rox) ───────────────── */
      .hyrox-block {
        margin-top: 20px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
      }
      .hyrox-block h4 {
        font-size: 13px;
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .hyrox-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }
      .hyrox-sum-cell {
        background: rgba(255,255,255,.03);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
      }
      .hyrox-sum-cell .lbl {
        font-size: 10px;
        font-family: var(--mono);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .hyrox-sum-cell .val {
        font-family: var(--mono);
        font-size: 18px;
        font-weight: 800;
        color: var(--text);
        margin-top: 4px;
      }
      .hyrox-sum-cell .sub {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--muted);
        margin-top: 4px;
      }
      .delta-faster { color: #34D399 !important; }
      .delta-slower { color: #FB923C !important; }
      .hyrox-note {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 10px;
        line-height: 1.45;
      }
      .hyrox-scroll { overflow-x: auto; margin: 0 -4px; }
      .hyrox-table {
        width: 100%;
        min-width: 840px;
        border-collapse: collapse;
        font-size: 11px;
        font-family: var(--mono);
      }
      .hyrox-table th {
        text-align: left;
        padding: 8px 6px;
        color: var(--muted);
        font-weight: 600;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      .hyrox-table td {
        padding: 8px 6px;
        border-bottom: 1px solid rgba(255,255,255,.06);
        vertical-align: middle;
      }
      .hyrox-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }
      .hyrox-seg-name { font-weight: 700; color: var(--text); max-width: 140px; }
      .hyrox-seg-idx { color: var(--muted); font-weight: 600; width: 28px; }
      .hyrox-type-run { color: #60A5FA; }
      .hyrox-type-station { color: #A78BFA; }
      .hyrox-empty {
        font-size: 12px;
        color: var(--muted);
        font-style: italic;
        padding: 8px 0;
      }
      .dnf-banner {
        background: rgba(248,113,113,.12);
        border: 1px solid rgba(248,113,113,.35);
        color: #F87171;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div id="hero">
      <div class="hero-logo">Hyrox Epicure · Résultats</div>
      <div class="hero-title">🏅 Trouve tes résultats</div>
      <div class="hero-sub">Chrono course, épreuves club, détail des <strong>segments Hyrox</strong> &amp; <strong>zones Rox</strong> vs ta catégorie</div>

      <div id="search-wrap">
        <input type="text" id="search-input" placeholder="Nom ou prénom…" autocomplete="off" spellcheck="false" />
        <span id="search-icon">🔍</span>
        <div id="autocomplete"></div>
      </div>
      <div id="search-status">Chargement des données…</div>
    </div>

    <div id="results"></div>

    <script src="./assets/js/data.js"></script>
    <script>
    // ══════════════════════════════════════════════════════════
    //  CONSTANTES
    // ══════════════════════════════════════════════════════════
    const SUPABASE_URL  = "https://exxbcrbafrzkhcvwkffg.supabase.co";
    const SUPABASE_KEY  = "sb_publishable_TiwXEH-JopQejQ0I04r9MQ_ieo5y9Ko";
    const TIMECAP_OFF   = 100000;

    const ZONE_META = {
      ev_warmup:   { icon:"🔥", color:"#F97316" },
    };

    const MEDAL_RANK = { 1: "🥇", 2: "🥈", 3: "🥉" };

    /** Aligné sur équipe/club (`lastName`, `firstName`, …) pour HyroxStore.* */
    function indexEntryAsTeam(en) {
      if (!en) return {};
      const tf =
        en.teamFormat === HyroxStore.TEAM_FORMAT_DUO_H ||
        en.teamFormat === HyroxStore.TEAM_FORMAT_DUO_F ||
        en.teamFormat === HyroxStore.TEAM_FORMAT_MIXTE ||
        en.teamFormat === HyroxStore.TEAM_FORMAT_SOLO
          ? en.teamFormat
          : HyroxStore.TEAM_FORMAT_SOLO;
      return {
        id: en.teamId,
        lastName: en.last || "",
        firstName: en.first || "",
        partnerLastName: en.partnerLastName || "",
        partnerFirstName: en.partnerFirstName || "",
        category: en.category || "Open",
        teamFormat: tf,
        gender: en.gender || "",
      };
    }

    // ══════════════════════════════════════════════════════════
    //  FETCH TOUTES LES COMPÉTITIONS
    // ══════════════════════════════════════════════════════════
    let allCompStates = []; // [{ id, state, updatedAt }]
    let athleteIndex  = []; // [{ key, lastName, firstName, category, gender, compId, compName, compDate, teamId }]

    async function supaFetch(path) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      if (!res.ok) throw new Error(`Supabase ${res.status}: ${await res.text()}`);
      return res.json();
    }

    async function loadAllCompetitions() {
      // 1. Lister les compétitions (slugs gérés par l’appli, préfixe hyrox-)
      const comps = await supaFetch("competition_states?select=id,updated_at&order=updated_at.desc&limit=200");
      const hyroxComps = (comps || []).filter((c) => HyroxStore.isHyroxCompetitionId(c.id));
      if (!hyroxComps.length) return;

      // 2. Charger tous les états en parallèle
      const results = await Promise.allSettled(
        hyroxComps.map(c =>
          supaFetch(`competition_states?id=eq.${encodeURIComponent(c.id)}&select=state,updated_at&limit=1`)
            .then(rows => ({ id: c.id, state: rows[0]?.state||null, updatedAt: rows[0]?.updated_at||null }))
        )
      );

      allCompStates = results
        .filter(r => r.status === "fulfilled" && r.value.state)
        .map(r => r.value);

      // 3. Construire l'index des athlètes
      athleteIndex = [];
      allCompStates.forEach(({ id: compId, state, updatedAt }) => {
        const compName = state.config?.competitionName || compId;
        const compDate = state.config?.date || "";
        (state.teams || []).forEach(team => {
          const last  = (team.lastName  || "").toUpperCase();
          const first = team.firstName  || "";
          const key   = `${last} ${first}`.trim();
          if (!key) return;
          const searchBlob = `${key} ${(team.partnerLastName || "").toUpperCase()} ${(team.partnerFirstName || "")}`.trim();
          athleteIndex.push({
            key, searchBlob, last, first,
            partnerLastName: team.partnerLastName,
            partnerFirstName: team.partnerFirstName,
            category: team.category || "—",
            teamFormat: team.teamFormat,
            gender:   team.gender   || "",
            compId, compName, compDate, updatedAt,
            teamId: team.id,
          });
        });
      });

      const total = athleteIndex.length;
      const compsCount = allCompStates.length;
      document.getElementById("search-status").textContent =
        `${total} athlète${total>1?"s":""} dans ${compsCount} compétition${compsCount>1?"s":""}`;
    }

    // ══════════════════════════════════════════════════════════
    //  SEARCH & AUTOCOMPLETE
    // ══════════════════════════════════════════════════════════
    const searchInput  = document.getElementById("search-input");
    const acBox        = document.getElementById("autocomplete");
    let acFocusIdx     = -1;

    function normalize(s) { return s.toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu,""); }

    function searchAthletes(query) {
      if (!query || query.length < 2) return [];
      const q = normalize(query);
      /** Une entrée par personne ; en cas de doublons (plusieurs comps), on garde la ligne la plus récemment mise à jour. */
      const latestByKey = new Map();
      athleteIndex.forEach((a) => {
        if (!normalize(a.searchBlob || a.key).includes(q)) return;
        const nameKey = `${normalize(a.last)}|${normalize(a.first)}`;
        const prev = latestByKey.get(nameKey);
        const tA = a.updatedAt ? new Date(a.updatedAt).getTime() : 0;
        const tP = prev && prev.updatedAt ? new Date(prev.updatedAt).getTime() : -1;
        if (!prev || tA >= tP) latestByKey.set(nameKey, a);
      });
      return [...latestByKey.values()]
        .sort((a, b) => {
          const ln = normalize(a.last).localeCompare(normalize(b.last));
          if (ln !== 0) return ln;
          return normalize(a.first).localeCompare(normalize(b.first));
        })
        .slice(0, 24);
    }

    function escHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderAC(items) {
      acFocusIdx = -1;
      if (!items.length) {
        acBox.innerHTML = `<div class="ac-empty">Aucun athlète trouvé</div>`;
        acBox.classList.add("open");
        return;
      }
      acBox.innerHTML = items
        .map((a, i) => {
          const t = indexEntryAsTeam(a);
          return `
        <div class="ac-item" data-idx="${i}" tabindex="-1">
          <div>
            <div class="ac-name">${escHtml(HyroxStore.formatTeamDisplayName(t))}</div>
            <div class="ac-meta">${escHtml(HyroxStore.formatTeamDivisionLine(t))}</div>
          </div>
        </div>`;
        })
        .join("");
      acBox.classList.add("open");

      acBox.querySelectorAll(".ac-item").forEach((el, i) => {
        el.addEventListener("mousedown", (e) => { e.preventDefault(); pickAthlete(items[i]); });
      });
    }

    function pickAthlete(entry) {
      searchInput.value = `${entry.last} ${entry.first}`;
      acBox.classList.remove("open");
      showAthleteResults(entry.last, entry.first);
    }

    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim();
      if (q.length < 2) { acBox.classList.remove("open"); return; }
      renderAC(searchAthletes(q));
    });

    searchInput.addEventListener("keydown", (e) => {
      const items = acBox.querySelectorAll(".ac-item");
      if (!items.length && (e.key === "ArrowDown" || e.key === "ArrowUp")) return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        acFocusIdx = Math.min(acFocusIdx + 1, Math.max(items.length - 1, 0));
        items.forEach((el, i) => el.classList.toggle("focused", i === acFocusIdx));
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        acFocusIdx = Math.max(acFocusIdx - 1, 0);
        items.forEach((el, i) => el.classList.toggle("focused", i === acFocusIdx));
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (acFocusIdx >= 0 && items[acFocusIdx]) {
          items[acFocusIdx].dispatchEvent(new MouseEvent("mousedown",{bubbles:true}));
        } else {
          const q = searchInput.value.trim();
          if (q.length >= 2) showAthleteResults(q);
        }
      } else if (e.key === "Escape") {
        acBox.classList.remove("open");
      }
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest("#search-wrap")) acBox.classList.remove("open");
    });

    // ══════════════════════════════════════════════════════════
    //  AFFICHAGE DES RÉSULTATS
    // ══════════════════════════════════════════════════════════
    function fmtDate(d) {
      if (!d) return "";
      try { return new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"}); }
      catch { return d; }
    }

    function fmtScore(sc, ev) {
      if (!sc) return null;
      if (sc.dnf) return { text:"DNF", isDNF:true };
      if (sc.timeCapped && ev.timeCap) {
        return { text:`TC +${sc.reps||0} reps`, isDNF:false, isTC:true };
      }
      return { text: sc.performance || String(sc.rawValue || "—"), isDNF:false };
    }

    function rankClass(r) {
      if (r===1) return "r1";
      if (r===2) return "r2";
      if (r===3) return "r3";
      return "best";
    }

    function hasPassageData(segs) {
      for (let i = 0; i < 16; i++) {
        const d = String(segs[i]?.dep || "").trim();
        if (d && HyroxStore.parsePassageClock(d) != null) return true;
      }
      return false;
    }

    function cohortTeams(state, gk) {
      return (state.teams || []).filter((t) => HyroxStore.rankGroupKey(t) === gk);
    }

    function meanPositive(arr) {
      const v = arr.filter((x) => x != null && isFinite(x) && x >= 0);
      if (!v.length) return null;
      return v.reduce((a, b) => a + b, 0) / v.length;
    }

    function avgRoxSegmentForCohort(state, gk, segIdx) {
      const vals = [];
      cohortTeams(state, gk).forEach((t) => {
        const segs = HyroxStore.getPassageSegmentsReadOnly(state, t.id);
        const r = HyroxStore.roxTransitionZoneSec(
          segs[segIdx]?.dep,
          segs[segIdx + 1]?.arr
        );
        if (r != null && r >= 0 && isFinite(r)) vals.push(r);
      });
      return meanPositive(vals);
    }

    function avgSegDurationForCohort(state, gk, segIdx) {
      const vals = [];
      cohortTeams(state, gk).forEach((t) => {
        const segs = HyroxStore.getPassageSegmentsReadOnly(state, t.id);
        const d = HyroxStore.roxSegmentDurationSec(segs[segIdx]?.arr, segs[segIdx]?.dep);
        if (d != null && d >= 0 && isFinite(d)) vals.push(d);
      });
      return meanPositive(vals);
    }

    function cohortGlobalSeconds(state, gk) {
      const vals = [];
      cohortTeams(state, gk).forEach((t) => {
        const s = HyroxStore.getHyroxGlobalTimeSec(state, t.id);
        if (s != null && s > 0 && isFinite(s)) vals.push(s);
      });
      return vals;
    }

    function formatDeltaVsAvgGlobal(athleteSec, avgSec) {
      if (athleteSec == null || avgSec == null || !isFinite(athleteSec) || !isFinite(avgSec))
        return { text: "", cls: "" };
      const diff = athleteSec - avgSec;
      const absFmt = HyroxStore.formatDurationMMSS(Math.abs(diff));
      if (Math.abs(diff) < 8) return { text: " ≈ même temps que la moyenne", cls: "" };
      if (diff <= 0) return { text: ` (${absFmt} plus rapide que la moy.)`, cls: "delta-faster" };
      return { text: ` (${absFmt} plus lent que la moy.)`, cls: "delta-slower" };
    }

    function formatDeltaRoxCell(athRox, avgRox) {
      if (athRox == null || avgRox == null) return { text: "—", cls: "" };
      const diff = athRox - avgRox;
      const absFmt = HyroxStore.formatDurationMMSS(Math.abs(diff));
      if (Math.abs(diff) < 0.75) return { text: "≈", cls: "" };
      if (diff <= 0) return { text: `−${absFmt}`, cls: "delta-faster" };
      return { text: `+${absFmt}`, cls: "delta-slower" };
    }

    /** Bloc HTML : tableau segments + zones Rox vs moyenne catégorie. */
    function buildHyroxSectionHtml(state, teamId, team) {
      const segs = HyroxStore.getPassageSegmentsReadOnly(state, teamId);
      const gk = HyroxStore.rankGroupKey(team);
      const L = HyroxStore.HYROX_PASSAGE_LABELS;
      const dnf = HyroxStore.getHyroxPassageDnf(state, teamId);
      const mates = cohortTeams(state, gk);
      const catLbl = HyroxStore.rankGroupCategoryLabel(gk);

      if (!hasPassageData(segs)) {
        if (dnf) {
          return `<div class="hyrox-block">
            <div class="dnf-banner"><strong>DNF</strong> — parcours non terminé (enregistré sur la page Passages).</div>
            <h4>Parcours Hyrox — segments &amp; zones Rox</h4>
            <p class="hyrox-empty">Aucun chronométrage de segment saisi : le parcours est marqué en abandon. Si c’est une erreur, les organisateurs peuvent décocher le DNF sur la page Passages.</p>
          </div>`;
        }
        return `<div class="hyrox-block">
          <h4>Parcours Hyrox — segments &amp; zones Rox</h4>
          <p class="hyrox-empty">Aucun passage chronométré enregistré pour cette compétition. Les comparaisons à la catégorie apparaissent lorsque les organisateurs saisissent les temps sur la page Passages.</p>
        </div>`;
      }

      const globalAth = HyroxStore.getHyroxGlobalTimeSec(state, teamId);
      const globals = cohortGlobalSeconds(state, gk);
      const avgGlobal = globals.length ? meanPositive(globals) : null;

      const glDelta = formatDeltaVsAvgGlobal(globalAth, avgGlobal);

      const summary = `<div class="hyrox-summary">
        <div class="hyrox-sum-cell">
          <div class="lbl">Chrono course (gun)</div>
          <div class="val">${globalAth != null ? HyroxStore.formatHyroxRaceDuration(globalAth) : "—"}</div>
          <div class="sub">
            Moy. ${catLbl} : ${avgGlobal != null ? HyroxStore.formatHyroxRaceDuration(avgGlobal) : "—"}
            <span class="${glDelta.cls}">${glDelta.text}</span><br/>
            <span style="opacity:.85">(${globals.length} chrono${globals.length > 1 ? "s" : ""} valide${globals.length > 1 ? "s" : ""} / ${mates.length} inscrit${mates.length > 1 ? "s" : ""} catégorie)</span>
          </div>
        </div>
      </div>`;

      const dnfHtml = dnf
        ? `<div class="dnf-banner"><strong>DNF</strong> — parcours non terminé (passage saisi).</div>`
        : "";

      const rows = [];
      for (let i = 0; i < 16; i++) {
        const isRun = i % 2 === 0;
        const typCls = isRun ? "hyrox-type-run" : "hyrox-type-station";
        const segDur = HyroxStore.roxSegmentDurationSec(segs[i]?.arr, segs[i]?.dep);
        const segTxt = segDur != null ? HyroxStore.formatDurationMMSS(segDur) : "—";
        const avgSeg = avgSegDurationForCohort(state, gk, i);
        const segCmp =
          segDur != null && avgSeg != null
            ? formatDeltaRoxCell(segDur, avgSeg)
            : { text: "—", cls: "" };

        let roxTxt = "—";
        let avgRoxDisp = "—";
        let roxCmp = { text: "—", cls: "" };
        if (i < 15) {
          const athRox = HyroxStore.roxTransitionZoneSec(segs[i]?.dep, segs[i + 1]?.arr);
          const avgRox = avgRoxSegmentForCohort(state, gk, i);
          roxTxt = athRox != null ? HyroxStore.formatDurationMMSS(athRox) : "—";
          avgRoxDisp = avgRox != null ? HyroxStore.formatDurationMMSS(avgRox) : "—";
          roxCmp = formatDeltaRoxCell(athRox, avgRox);
        }

        rows.push(`<tr>
          <td class="hyrox-seg-idx">${i + 1}</td>
          <td class="hyrox-seg-name"><span class="${typCls}">${L[i]}</span></td>
          <td>${segTxt}</td>
          <td>${avgSeg != null ? HyroxStore.formatDurationMMSS(avgSeg) : "—"}</td>
          <td class="${segCmp.cls}">${segCmp.text}</td>
          <td>${i < 15 ? roxTxt : "—"}</td>
          <td>${i < 15 ? avgRoxDisp : "—"}</td>
          <td class="${roxCmp.cls}">${i < 15 ? roxCmp.text : "—"}</td>
        </tr>`);
      }

      return `<div class="hyrox-block">
        ${dnfHtml}
        <h4>Parcours Hyrox — segments &amp; zones Rox</h4>
        <p class="hyrox-note">Comparaison à la <strong>moyenne de ta catégorie</strong> (${catLbl}), sur les lignes où assez d’athlètes ont un temps comparable.</p>
        ${summary}
        <div class="hyrox-scroll">
          <table class="hyrox-table">
            <thead><tr>
              <th>#</th>
              <th>Segment</th>
              <th>Temps segment</th>
              <th>Moy. cat.</th>
              <th>Δ / moy.</th>
              <th>Zone Rox</th>
              <th>Moy. Rox</th>
              <th>Δ Rox</th>
            </tr></thead>
            <tbody>${rows.join("")}</tbody>
          </table>
        </div>
      </div>`;
    }

    function showAthleteResults(lastOrFull, firstArg) {
      const resultsEl = document.getElementById("results");
      resultsEl.innerHTML = "";

      // Trouver toutes les entrées correspondant à cet athlète
      let matches;
      if (firstArg !== undefined) {
        const normLast  = normalize(lastOrFull);
        const normFirst = normalize(firstArg);
        matches = athleteIndex.filter(a =>
          normalize(a.last)===normLast && normalize(a.first)===normFirst
        );
      } else {
        const q = normalize(lastOrFull);
        matches = athleteIndex.filter(a => normalize(a.key).includes(q));
      }

      // Dédupe par compId+teamId
      const seen = new Set();
      matches = matches.filter(a => {
        const k = `${a.compId}:${a.teamId}`;
        if (seen.has(k)) return false;
        seen.add(k); return true;
      });

      // Grouper par (last, first) pour fusionner plusieurs compétitions
      const byAthlete = {};
      matches.forEach(a => {
        const k = `${a.last}|${a.first}`;
        if (!byAthlete[k]) byAthlete[k] = [];
        byAthlete[k].push(a);
      });

      if (!Object.keys(byAthlete).length) {
        resultsEl.innerHTML = `<div class="empty-state">
          <div class="empty-icon">🔍</div>
          <div class="empty-title">Aucun résultat</div>
          <div>Aucun athlète correspondant n'a été trouvé.</div>
        </div>`;
        return;
      }

      Object.values(byAthlete).forEach(entries => {
        const b0 = entries[0];
        const tb0 = indexEntryAsTeam(b0);
        let initials = `${(tb0.lastName || "")[0] || ""}${(tb0.firstName || "")[0] || ""}`.trim() || "?";
        if ((tb0.partnerLastName || tb0.partnerFirstName) && HyroxStore.getTeamFormat(tb0) !== HyroxStore.TEAM_FORMAT_SOLO) {
          initials =
            `${(tb0.lastName || "")[0] || ""}${(tb0.firstName || "")[0] || ""}` +
            `${(tb0.partnerLastName || "")[0] || ""}${(tb0.partnerFirstName || "")[0] || ""}`;
        }
        const cardEl = document.createElement("div");
        cardEl.className = "ath-card";

        // ── En-tête de la carte ──
        const head = document.createElement("div");
        head.className = "ath-card-head";
        const bEff = HyroxStore.effectiveCategory(tb0);
        const bLine = HyroxStore.formatTeamDivisionLine(tb0);
        const dispMain = HyroxStore.formatTeamDisplayName(tb0);
        head.innerHTML = `
          <div class="ath-avatar">${escHtml(initials.toUpperCase().slice(0, 3))}</div>
          <div class="ath-name-block">
            <div class="ath-last" style="font-size:clamp(18px,4vw,24px);line-height:1.2">${escHtml(dispMain)}</div>
          </div>
          <div class="ath-badges">
            <span class="badge badge-${bEff}">${escHtml(bLine)}</span>
          </div>`;
        cardEl.appendChild(head);

        // ── Une section par compétition ──
        entries.sort((a,b)=>(b.compDate||"").localeCompare(a.compDate||"")).forEach(entry => {
          const compState = allCompStates.find(c=>c.id===entry.compId);
          if (!compState) return;
          const state = HyroxStore.normalizeState(JSON.parse(JSON.stringify(compState.state)));
          const team  = (state.teams||[]).find(t=>t.id===entry.teamId);
          if (!team) return;

          const ranking     = HyroxStore.getRanking(state);
          const myRanking   = ranking.find(r=>r.teamId===entry.teamId);
          const scoredEvents= (state.events||[]).filter(e=>e.scored).sort((a,b)=>a.order-b.order);
          const isDnf       = HyroxStore.teamIsDnf(state, entry.teamId);
          const passageDnf  = HyroxStore.getHyroxPassageDnf(state, entry.teamId);
          const segsAth     = HyroxStore.getPassageSegmentsReadOnly(state, entry.teamId);
          const hyroxGlobal = HyroxStore.getHyroxGlobalTimeSec(state, entry.teamId);
          const hyroxPartial = hasPassageData(segsAth);
          const hyroxAny    = hyroxGlobal != null || hyroxPartial;

          const gk0 = HyroxStore.rankGroupKey(team);
          const groupRanking = ranking.filter(r=>
            HyroxStore.rankGroupKey(r.team) === gk0 && r.scoredCount>0
          );
          let groupRank = null;
          if (myRanking && myRanking.scoredCount > 0) {
            groupRank = groupRanking.findIndex(r=>r.teamId===entry.teamId) + 1;
          }

          // Trouver le heat de l'athlète
          const schedule  = HyroxStore.buildHeatSchedule(state);
          const heatEntry = schedule.find(h=>h.athletes.some(a=>a.id===entry.teamId));
          const heatNum   = heatEntry ? `H${heatEntry.heat}` : "";

          const section = document.createElement("div");
          section.className = "comp-block";

          // Nombre d’épreuves scorées avec un score réel
          const scoredCount = myRanking?.scoredCount || 0;

          // ── Build HTML ──
          let rankHtml = "";
          if (groupRank !== null) {
            const medal = groupRank <= 3 ? (MEDAL_RANK[groupRank] || "🏅") : "";
            const rcls  = `rank-num ${rankClass(groupRank)}`;
            const dnfNote = isDnf
              ? `<div class="rank-dnf-note">Statut <strong style="color:#F87171">DNF</strong> — abandon sur le parcours et/ou sur au moins une épreuve scorée.</div>`
              : "";
            rankHtml = `
              <div class="rank-podium">
                <div class="rank-medal">${medal||"🏅"}</div>
                <div class="rank-info">
                  <div class="rank-label">${HyroxStore.formatTeamDivisionLine(team)}</div>
                  <div class="${rcls}">${groupRank}${ordinal(groupRank)}</div>
                  <div class="rank-total">${scoredCount} épreuve${scoredCount>1?"s":""} scorée${scoredCount>1?"s":""} · total rangs : ${myRanking.total}</div>
                  ${dnfNote}
                </div>
                ${heatNum ? `<div class="rank-heat">${heatNum}</div>` : ""}
              </div>`;
          } else if (isDnf) {
            const dnfExplain = passageDnf
              ? "Parcours enregistré en abandon (DNF) depuis la page Passages — pas de chrono global ni de détail segments."
              : "Abandon (DNF) enregistré sur au moins une épreuve scorée par les organisateurs.";
            rankHtml = `<div class="rank-podium rank-podium-dnf">
              <div class="rank-medal rank-medal--dnf">DNF</div>
              <div class="rank-info">
                <div class="rank-label">${HyroxStore.formatTeamDivisionLine(team)}</div>
                <div class="rank-num rank-num-dnf">Abandon</div>
                <div class="rank-total">${dnfExplain}</div>
              </div>
              ${heatNum ? `<div class="rank-heat">${heatNum}</div>` : ""}
            </div>`;
          } else if (hyroxAny) {
            const timeLine =
              hyroxGlobal != null ? HyroxStore.formatHyroxRaceDuration(hyroxGlobal) : "—";
            const clubHint =
              scoredEvents.length > 0
                ? `<div class="rank-hyrox-hint">Les <strong>${scoredCount} / ${scoredEvents.length}</strong> ci-après comptent uniquement les <strong>épreuves club</strong> saisies (distinctes du chronomètre officiel du parcours).</div>`
                : "";
            rankHtml = `<div class="rank-podium rank-podium-hyrox">
              <div class="rank-medal">🏁</div>
              <div class="rank-info">
                <div class="rank-label">${HyroxStore.formatTeamDivisionLine(team)}</div>
                <div class="rank-num rank-num-hyrox">${hyroxGlobal != null ? timeLine : "Parcours"}</div>
                ${clubHint}
              </div>
              ${heatNum ? `<div class="rank-heat">${heatNum}</div>` : ""}
            </div>`;
          } else {
            rankHtml = `<div class="rank-podium">
              <div class="rank-medal">⏳</div>
              <div class="rank-info">
                <div class="rank-label">${HyroxStore.formatTeamDivisionLine(team)}</div>
                <div class="rank-num rN">—</div>
                <div class="rank-total">Pas encore de score ni de passage Hyrox</div>
              </div>
              ${heatNum ? `<div class="rank-heat">${heatNum}</div>` : ""}
            </div>`;
          }

          // Lignes par épreuve scorée
          const zonesHtml = scoredEvents.map(ev => {
            const sc   = (state.scores||[]).find(s=>s.teamId===entry.teamId && s.eventId===ev.id);
            const meta = ZONE_META[ev.id] || { icon:"📋", color:"#888" };
            const evRank = myRanking?.eventRanks?.find(r=>r.eventId===ev.id)?.rank ?? null;

            if (!sc) {
              return `<div class="zone-row">
                <span class="zone-icon">${meta.icon}</span>
                <span class="zone-name">${escHtml(ev.name)}</span>
                <span class="zone-no-score">Pas de score</span>
              </div>`;
            }

            const fmt    = fmtScore(sc, ev);
            const rCls   = evRank ? rankClass(evRank) : "";
            const rankLbl= evRank ? `#${evRank}` : "—";

            let subLine = "";
            if (fmt?.sub) {
              subLine = `<div class="zone-subvals">${fmt.sub}</div>`;
            }

            return `<div class="zone-row" style="border-left:3px solid ${meta.color}40">
              <span class="zone-icon">${meta.icon}</span>
              <div style="flex:1">
                <div class="zone-name">${escHtml(ev.name)}</div>
                ${subLine}
              </div>
              <span class="zone-score-val ${fmt?.isDNF?"dnf":""}">${fmt?.text||"—"}</span>
              <span class="zone-rank ${rCls}">${rankLbl}</span>
            </div>`;
          }).join("");

          // Barre de complétion
          const dots = scoredEvents.map(ev => {
            const sc = (state.scores||[]).find(s=>s.teamId===entry.teamId && s.eventId===ev.id);
            let dotCls = "";
            if (sc?.dnf) dotCls = "dnf";
            else if (sc && !sc.dnf) dotCls = "done";
            const title = escHtml(ev.name) + (sc?.dnf ? " — DNF" : "");
            return `<span class="completion-dot ${dotCls}" title="${title}"></span>`;
          }).join("");

          const hyroxHtml = buildHyroxSectionHtml(state, entry.teamId, team);

          const progressNote =
            hyroxAny && scoredEvents.length > 0
              ? `<div class="club-progress-note">Le chrono <strong>gun</strong> du parcours Hyrox est dans l’encadré jaune ci-dessus ; les pastilles comptent les scores <strong>club</strong> (zones), pas le parcours officiel.</div>`
              : "";

          section.innerHTML = `
            <div class="comp-head">
              <span class="badge badge-comp">${escHtml(entry.compId)}</span>
              <span class="comp-name">${escHtml(entry.compName)}</span>
              ${entry.compDate ? `<span class="comp-date">${fmtDate(entry.compDate)}</span>` : ""}
            </div>
            ${rankHtml}
            <div class="zone-scores">${zonesHtml}</div>
            ${progressNote}
            <div class="completion-bar">
              <span>Épreuves club (points / rang) :</span>
              <span class="completion-dots">${dots}</span>
              <span>${scoredCount} / ${scoredEvents.length} épreuve${scoredEvents.length>1?"s":""}</span>
            </div>
            ${hyroxHtml}`;

          cardEl.appendChild(section);
        });

        resultsEl.appendChild(cardEl);
      });
    }

    function ordinal(n) {
      if (n===1) return "er";
      return "ème";
    }

    // ══════════════════════════════════════════════════════════
    //  URL PARAM : ?q=DUPONT
    // ══════════════════════════════════════════════════════════
    function checkUrlQuery() {
      const params = new URLSearchParams(window.location.search);
      const q = params.get("q");
      if (q) {
        searchInput.value = decodeURIComponent(q);
        showAthleteResults(q);
      }
    }

    // ══════════════════════════════════════════════════════════
    //  INIT
    // ══════════════════════════════════════════════════════════
    (async () => {
      try {
        await loadAllCompetitions();
        checkUrlQuery();
      } catch (err) {
        document.getElementById("search-status").textContent = `Erreur : ${err.message}`;
      }
    })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
