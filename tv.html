/* ── AUTO-SCROLL ENGINE ────────────────────────────────────────── */
// px/s de défilement
const SCROLL_SPEED = 40;
// Pause en ms en haut et en bas avant d'inverser
const SCROLL_PAUSE = 2200;

const scrollers = {}; // id -> { raf, dir, paused }

function stopScroll(id){
  if(scrollers[id]){
    cancelAnimationFrame(scrollers[id].raf);
    delete scrollers[id];
  }
}

function startScroll(el){
  if(!el) return;
  const id = el.id || Math.random();
  stopScroll(id);

  let dir      = 1;        // 1 = vers le bas, -1 = vers le haut
  let pausing  = false;
  let pauseEnd = 0;
  let last     = null;

  function step(ts){
    if(!document.body.contains(el)){ stopScroll(id); return; }

    if(last===null) last=ts;
    const dt = (ts-last)/1000; // secondes
    last = ts;

    if(pausing){
      if(ts >= pauseEnd){ pausing=false; }
      scrollers[id].raf = requestAnimationFrame(step);
      return;
    }

    const maxScroll = el.scrollHeight - el.clientHeight;
    if(maxScroll <= 0){ scrollers[id].raf = requestAnimationFrame(step); return; }

    el.scrollTop += dir * SCROLL_SPEED * dt;

    if(dir===1 && el.scrollTop >= maxScroll - 2){
      el.scrollTop = maxScroll;
      dir = -1; pausing = true; pauseEnd = ts + SCROLL_PAUSE;
    } else if(dir===-1 && el.scrollTop <= 2){
      el.scrollTop = 0;
      dir = 1; pausing = true; pauseEnd = ts + SCROLL_PAUSE;
    }

    scrollers[id] = { raf: requestAnimationFrame(step), dir, pausing };
  }

  scrollers[id] = { raf: requestAnimationFrame(step), dir, pausing:true, pauseEnd: performance.now()+800 };
}

function startLiveScrollers(){
  Object.keys(scrollers).forEach(stopScroll);
  setTimeout(()=>{
    startScroll(document.getElementById('tv-live-grid'));
    startScroll(document.getElementById('lbScroll'));
  }, 300);
}

/* ══════════════════════════════════════════════════════════════
   POPUP DÉPART — son + décompte
   Décompte final : piste 10s (URL GitHub Pages hyflender) — un clic
   / toucher auparavant débloque l’autoplay.
   Bips (Web Audio) ailleurs : getTvAudioContext + resume().
══════════════════════════════════════════════════════════════ */
let _depTimer = null;
const _depShown = new Set();
let _tvAudioCtx = null;
let _depAudioFadeRaf = null;
const _DEP_AUDIO_FADE_IN_MS = 1000;

function getTvAudioContext() {
  if (_tvAudioCtx) return _tvAudioCtx;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  _tvAudioCtx = new AC();
  return _tvAudioCtx;
}
function _resumeTvAudio() {
  const ctx = getTvAudioContext();
  if (ctx && ctx.state === "suspended") {
    return ctx.resume().catch(() => {});
  }
  return Promise.resolve();
}
['click', 'touchstart', 'keydown', 'pointerdown'].forEach((ev) => {
  document.addEventListener(
    ev,
    () => {
      _resumeTvAudio();
    },
    { capture: true, passive: true }
  );
});

function _playOneBeep(frequency, durationSec, gain) {
  const ctx = getTvAudioContext();
  if (!ctx) return;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g);
  g.connect(ctx.destination);
  o.type = "sine";
  o.frequency.setValueAtTime(frequency, ctx.currentTime);
  const t0 = ctx.currentTime;
  const d = Math.max(0.05, durationSec);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(gain, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0008, t0 + d);
  o.start(t0);
  o.stop(t0 + d + 0.02);
}
/** Piste 10s (hyflender.github.io) — démarrage 1 s avant l’affichage « 10 » (dès 11 s restants) */
function _stopDepCountdownAudioFade() {
  if (_depAudioFadeRaf) {
    cancelAnimationFrame(_depAudioFadeRaf);
    _depAudioFadeRaf = null;
  }
}
function _startDepCountdownAudioFadeIn(a) {
  _stopDepCountdownAudioFade();
  a.volume = 0;
  const t0 = performance.now();
  function step(now) {
    if (!a || a.paused) {
      _depAudioFadeRaf = null;
      return;
    }
    const u = Math.min(1, (now - t0) / _DEP_AUDIO_FADE_IN_MS);
    a.volume = u;
    if (u < 1) {
      _depAudioFadeRaf = requestAnimationFrame(step);
    } else {
      _depAudioFadeRaf = null;
      a.volume = 1;
    }
  }
  _depAudioFadeRaf = requestAnimationFrame(step);
}
function _stopDepCountdownMp3() {
  const a = document.getElementById("dep-countdown-audio");
  _stopDepCountdownAudioFade();
  if (!a) return;
  try {
    a.pause();
    a.currentTime = 0;
    a.volume = 1;
  } catch (_) {}
}
function _startDepCountdownAudio(secsRemaining) {
  if (secsRemaining > 11) return;
  const a = document.getElementById("dep-countdown-audio");
  if (!a) return;
  const go = () => {
    try {
      _resumeTvAudio();
      // Entrée à t=0 de la piste = affichage « 11 s » ; « 10 s » = 1 s dans la piste
      const d = a.duration;
      if (d > 0 && isFinite(d) && d < 20) {
        const off = Math.max(0, Math.min(d - 0.04, 11 - secsRemaining));
        a.currentTime = off;
      } else {
        a.currentTime = Math.max(0, 11 - secsRemaining);
      }
      a.volume = 0;
      const p = a.play();
      const onPlay = () => {
        _startDepCountdownAudioFadeIn(a);
      };
      if (p && typeof p.then === "function") {
        p.then(onPlay).catch(() => {});
      } else {
        onPlay();
      }
    } catch (_) {}
  };
  if (a.readyState >= 1) go();
  else a.addEventListener("loadeddata", go, { once: true });
}
function _punch(el){ el.classList.remove('num-punch'); void el.offsetWidth; el.classList.add('num-punch'); }

const RING_R   = 128;
const RING_C   = 2 * Math.PI * RING_R; // ≈ 804

function setRing(secs, total){
  const fill = document.getElementById('dep-ring-fill');
  if(!fill) return;
  const progress = Math.max(0, Math.min(1, secs / Math.max(total,1)));
  fill.style.strokeDasharray  = RING_C;
  fill.style.strokeDashoffset = RING_C * (1 - progress);
}

const _arrivalFC = [];
let _arrivalCRaf = null;
let _arrivalInit = false;
const _arrivalPopped = new Set();
const _arrivalQueue = [];
let _arrivalShowing = false;
let _arrivalHideT = 0;

function _launchArrivalConfetti() {
  const canvas = document.getElementById("finish-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (_arrivalCRaf) {
    cancelAnimationFrame(_arrivalCRaf);
    _arrivalCRaf = null;
  }
  _arrivalFC.length = 0;
  const palette = ["#FFD700", "#C6FF00", "#fff", "#D9A23B", "#A3E635", "#A78BFA", "#F472B6"];
  for (let i = 0; i < 200; i++) {
    const col = palette[Math.floor(Math.random() * palette.length)];
    _arrivalFC.push({
      x: Math.random() * canvas.width,
      y: -30 - Math.random() * canvas.height * 0.4,
      r: 3 + Math.random() * 8,
      w: 6 + Math.random() * 12,
      h: 3 + Math.random() * 8,
      type: Math.random() < 0.5 ? "rect" : "circle",
      color: col,
      vx: (Math.random() - 0.5) * 5,
      vy: 2.5 + Math.random() * 5,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.2,
      alpha: 1,
      gravity: 0.1 + Math.random() * 0.12,
      wave: Math.random() * Math.PI * 2,
      waveA: 0.4 + Math.random() * 1.2,
    });
  }
  for (let side = 0; side < 2; side++) {
    for (let j = 0; j < 32; j++) {
      const col = palette[Math.floor(Math.random() * palette.length)];
      _arrivalFC.push({
        x: side === 0 ? 0 : canvas.width,
        y: canvas.height * (0.35 + Math.random() * 0.35),
        r: 3 + Math.random() * 6,
        w: 7 + Math.random() * 10,
        h: 3 + Math.random() * 7,
        type: Math.random() < 0.5 ? "rect" : "circle",
        color: col,
        vx: (side === 0 ? 1 : -1) * (6 + Math.random() * 9),
        vy: -(3 + Math.random() * 7),
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.25,
        alpha: 1,
        gravity: 0.15 + Math.random() * 0.1,
        wave: Math.random() * Math.PI * 2,
        waveA: 0.6 + Math.random() * 1,
      });
    }
  }
  let t = 0;
  function step() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t++;
    let alive = false;
    for (const p of _arrivalFC) {
      p.x += p.vx + Math.sin(p.wave + t * 0.05) * p.waveA;
      p.y += p.vy;
      p.vy += p.gravity;
      p.rot += p.rotV;
      if (p.y > canvas.height + 20) p.alpha = 0;
      if (p.alpha <= 0) continue;
      alive = true;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.type === "circle") {
        ctx.beginPath();
        ctx.ellipse(0, 0, p.r, p.r * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      }
      ctx.restore();
    }
    if (alive) _arrivalCRaf = requestAnimationFrame(step);
    else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      _arrivalCRaf = null;
    }
  }
  _arrivalCRaf = requestAnimationFrame(step);
}

function suppressArrivalPopupsForCurrentFinishes() {
  if (!state) return;
  const nm = nowMin();

    const t0 = getAthleteHeatStart(ath, state);
    if (t0 == null) return;

  });

}

function checkArrivalPopups() {
  if (!state) return;
  const nm = nowMin();
  const nowDone = new Set();
  (state.teams || []).forEach((ath) => {
    const t0 = getAthleteHeatStart(ath, state);
    if (t0 == null) return;
    if (athleteTvRaceFinished(ath, state, nm).finished) nowDone.add(ath.id);
  });
  (state.teams || []).forEach((ath) => {
    if (nowDone.has(ath.id)) {
      if (!_arrivalPopped.has(ath.id)) {
        _arrivalPopped.add(ath.id);
        if (_arrivalInit) _arrivalQueue.push(ath);
      }
    } else {
      _arrivalPopped.delete(ath.id);
    }
  });
  if (!_arrivalInit) {
    _arrivalInit = true;
    _arrivalQueue.length = 0;
  } else {
    processArrivalQueue();
  }
}

function _launchConfetti(accentColor){
  const canvas = document.getElementById('go-canvas');

  if(_goRAF){ cancelAnimationFrame(_goRAF); _goRAF=null; }

  // Générer 220 confettis depuis le haut
  for(let i=0;i<220;i++){
    const col = palette[Math.floor(Math.random()*palette.length)];
    _confetti.push({
      x: Math.random()*canvas.width,
      y: -20 - Math.random()*canvas.height*.5,
      r: 4 + Math.random()*7,
      w: 7 + Math.random()*12,   // largeur pour les rectangles
      h: 4 + Math.random()*8,    // hauteur
      type: Math.random()<.5 ? 'rect' : 'circle',
      color: col,
      vx: (Math.random()-0.5)*6,
      vy: 3 + Math.random()*6,
      rot: Math.random()*Math.PI*2,
      rotV: (Math.random()-0.5)*.25,
      alpha: 1,
      gravity: .12 + Math.random()*.1,
      wave: Math.random()*Math.PI*2,
      waveA: .5 + Math.random()*1.5,
    });
  }

  // Lancer depuis les deux coins en plus
  for(let side=0;side<2;side++){
    for(let i=0;i<40;i++){
      const col = palette[Math.floor(Math.random()*palette.length)];
      _confetti.push({
        x: side===0 ? 0 : canvas.width,
        y: canvas.height * (.4 + Math.random()*.3),
        r: 4+Math.random()*6, w:8+Math.random()*10, h:4+Math.random()*7,
        type: Math.random()<.5?'rect':'circle',
        color: col,
        vx: (side===0?1:-1)*(8+Math.random()*10),
        vy: -(4+Math.random()*8),
        rot: Math.random()*Math.PI*2,
        rotV: (Math.random()-0.5)*.3,
        alpha:1, gravity:.18+Math.random()*.08,
        wave:Math.random()*Math.PI*2, waveA:.8+Math.random()*1.2,
      });
    }
  }

  let t = 0;
  function step(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    t++;
    let alive = false;
    for(const p of _confetti){
      p.x  += p.vx + Math.sin(p.wave + t*.05)*p.waveA;
      p.y  += p.vy;
      p.vy += p.gravity;
      p.rot += p.rotV;
      if(p.y > canvas.height + 20) p.alpha = 0;
      if(p.alpha <= 0) continue;
      alive = true;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.type==='circle'){
        ctx.beginPath(); ctx.ellipse(0,0,p.r,p.r*.45,0,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      }
      ctx.restore();
    }
    if(alive) _goRAF = requestAnimationFrame(step);
    else { ctx.clearRect(0,0,canvas.width,canvas.height); _goRAF=null; }
  }
  _goRAF = requestAnimationFrame(step);
}

  }).join('');

  // Reset countdown display

  const depLbl = document.getElementById('dep-label');
  if (depLbl) {
    depLbl.style.display = '';
    depLbl.textContent = 'Départ imminent';
  }
  goEl.style.display = 'none'; goEl.className = '';
  const depUnit = document.getElementById('dep-unit');
  if (depUnit) depUnit.setAttribute('hidden', '');

  _stopDepCountdownMp3();
  setRing(secsLeft, total);
  barEl.style.transition = 'none'; barEl.style.width = '0%';
  overlay.classList.add('show');

  if (secsLeft <= 11) _startDepCountdownAudio(secsLeft);

  let secs = secsLeft;

    setRing(secs, total);

    if(secs <= 3 && secs > 0){
      const urgCols = { 3:'#f0a050', 2:'#e84040', 1:'#ff1a1a' };

      barEl.style.width = '100%';
      overlay.classList.remove('show');
      showGoScreen(meta, allAths, zColor);
    }

function checkDepartures(){

    if(secs<=60&&secs>=0) toShow.push({...e,secs,key});
  });

  toShow.forEach(t=>_depShown.add(t.key));
  const minSecs=Math.min(...toShow.map(t=>t.secs));

  const atSameTime=toShow.filter(t=>Math.abs(t.secs-minSecs)<=2);
  showDep(atSameTime, minSecs);
}

/* ── NEWS TICKER ───────────────────────────────────────────────── */
let _tickerRAF = null;
let _tickerPos = null;
let _tickerTs  = null;
const TICKER_SPEED = 80; // px/s

function renderTicker(state){
  const news   = (state.news||[]).filter(n=>n.active!==false && n.text?.trim());
  const ticker = document.getElementById('news-ticker');
  const inner  = document.getElementById('tickerInner');

  if(!news.length){
    ticker.classList.add('hidden');
    if(_tickerRAF){ cancelAnimationFrame(_tickerRAF); _tickerRAF=null; }
    return;
  }
  ticker.classList.remove('hidden');

  // Rebuild content (pas de duplication)
  inner.innerHTML = news.map(n=>
    `<span class="ticker-msg">${n.text}</span><span class="ticker-dot"></span>`
  ).join('');

  // Lancer le scroll JS depuis la droite
  if(_tickerRAF){ cancelAnimationFrame(_tickerRAF); _tickerRAF=null; }
  _tickerPos = null; _tickerTs = null;

  function step(ts){
    const track = inner.parentElement;
    if(!track || !document.body.contains(inner)){ _tickerRAF=null; return; }

    // Initialiser la position hors-écran droite
    if(_tickerPos===null) _tickerPos = track.clientWidth;
    if(_tickerTs===null)  _tickerTs  = ts;

    const dt = Math.min((ts - _tickerTs) / 1000, 0.1); // cap à 100ms pour éviter les sauts
    _tickerTs = ts;
    _tickerPos -= TICKER_SPEED * dt;

    // Quand le contenu est sorti par la gauche → recommencer depuis la droite
    if(_tickerPos + inner.scrollWidth < 0) _tickerPos = track.clientWidth;

    inner.style.transform = `translateX(${_tickerPos}px)`;
    _tickerRAF = requestAnimationFrame(step);
  }
  _tickerRAF = requestAnimationFrame(step);
}



/* ── TOAST (score live) ────────────────────────────────────────── */
let prevScoreSnapshot = '';

function scoreVal(s){
  if(s==null) return '';
  if(s.dnf) return 'dnf';
  const v = s.rawValue;
  if(v!=null && v!=='') return String(v);
  return String(s.performance ?? '');
}

function checkNewScores(nextState){
  const list = (nextState.scores||[]).map(s=>({ t:s.teamId, e:s.eventId, v:scoreVal(s) }));
  const snapshot = JSON.stringify(list.sort((a,b)=>a.t.localeCompare(b.t)||a.e.localeCompare(b.e)));
  if(prevScoreSnapshot && snapshot !== prevScoreSnapshot){
    const prev = JSON.parse(prevScoreSnapshot||'[]');
    const byKey = p=>p.t+'\0'+p.e;
    const prevMap = new Map(prev.map(p=>[byKey(p),p]));
    (nextState.scores||[]).forEach(ns=>{
      const key = byKey({ t:ns.teamId, e:ns.eventId });
      const was = prevMap.get(key);
      const vNow = scoreVal(ns);
      if(was && was.v === vNow) return;
      const ath=nextState.teams.find(t=>t.id===ns.teamId);
      const ev=nextState.events.find(e=>e.id===ns.eventId);
      if(ath && ev) showScoreUpdateToast({ ath, ev, performance:ns.performance || vNow, isUpdate:!!was });
    });
  }
  prevScoreSnapshot = snapshot;
}

function showScoreUpdateToast({ ath, ev, performance, isUpdate }){
  const wrap=document.getElementById('toast');
  if(!wrap) return;
  const meta = ZM[ev.id] || { color:'#C6FF00', icon:'🏅', label:ev.name || 'Épreuve' };
  const el=document.createElement('div');
  el.className='toast-item';
  el.style.setProperty('--zcolor', meta.color);
  const ln=(ath.lastName||'').toUpperCase();
  const fn=ath.firstName?` ${ath.firstName}`:'';
  const evShort = (ev.name || "").trim();
  el.innerHTML=`
    <div class="toast-inner">
      <div class="toast-zone-ico" style="color:${meta.color}">${meta.icon||'🏅'}</div>
      <div class="toast-txt">
        <div class="toast-row1">
          <span class="toast-zone">${meta.label}</span>
          <span class="toast-badge ${isUpdate?'maj':'nouv'}">${isUpdate?'Modifié':'Nouveau'}</span>
        </div>
        <div class="toast-ath">${ln}${fn}</div>
        <div class="toast-ev">${evShort}</div>
        <div class="toast-score">${escHtml(String(performance||'—'))}<span class="toast-hint">${isUpdate?'score mis à jour':'score enregistré'}</span></div>
      </div>
    </div>
    <div class="toast-pbar"><div style="background:${meta.color}"></div></div>`;
  wrap.appendChild(el);
  if(wrap.children.length>4) wrap.firstElementChild?.remove();
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),360); },3800);
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const TC_TRIGGER   = 20;  // secondes avant l'alerte
const TC_CIRCUMF   = 207.3; // 2π × 33
const _tcAlerted   = new Set();
let   _tcActive    = false;
let   _tcEndSec    = 0;
let   _tcAnimFrame = null;

// Milestones par ev_id: { at (min depuis début créneau), label, sub, icon }
const TC_MILESTONES = {};

function _playAlertBeep(color) {
  const run = () => {
    try {
      const ctx = getTvAudioContext();
      if (!ctx) return;
      const freqs = [880, 1100];
      freqs.forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g);
        g.connect(ctx.destination);
        o.frequency.value = f;
        o.type = "sine";
        const t = ctx.currentTime + i * 0.18;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.35, t + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        o.start(t);
        o.stop(t + 0.26);
      });
    } catch (e) {}
  };
  const ctx = getTvAudioContext();
  if (!ctx) return;
  if (ctx.state === "suspended") {
    ctx.resume().then(run).catch(run);
  } else {
    run();
  }
}

function showTimecapAlert({ color, eventTitle, icon, label, sub, secRemaining, athletes }) {
  const overlay = document.getElementById('tc-overlay');
  if(!overlay) return;
  const arc   = document.getElementById('tc-arc');
  const numEl = document.getElementById('tc-num');

  overlay.style.setProperty('--tc-color', color);
  const hexToRgb = h => { const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `${r},${g},${b}`; };
  if(color.startsWith('#')) overlay.style.setProperty('--tc-rgb', hexToRgb(color));
  arc.style.stroke = color;

  document.getElementById('tc-ctx-lbl').textContent = eventTitle;
  document.getElementById('tc-label').textContent    = label;
  document.getElementById('tc-sub').textContent      = sub;
  document.getElementById('tc-icon').textContent     = icon;

  // Athlètes concernés
  const athEl = document.getElementById('tc-athletes');
  athEl.innerHTML = (athletes && athletes.length)
    ? athletes.map(n=>`<div class="tc-ath-tag">${n}</div>`).join('')
    : '';

  _tcEndSec = Date.now() + secRemaining * 1000;
  _tcActive = true;
  overlay.classList.add('show');
  _playAlertBeep(color);

  cancelAnimationFrame(_tcAnimFrame);
  function animRing(){
    const rem = Math.max(0, (_tcEndSec - Date.now()) / 1000);
    const pct  = rem / TC_TRIGGER;
    arc.style.strokeDashoffset = (TC_CIRCUMF * (1 - pct)).toFixed(2);
    numEl.textContent = Math.ceil(rem);
    if(rem > 0){
      _tcAnimFrame = requestAnimationFrame(animRing);
    } else {
      numEl.textContent = 'STOP';
      arc.style.strokeDashoffset = TC_CIRCUMF;
      setTimeout(()=>{ overlay.classList.remove('show'); _tcActive=false; }, 1800);
    }
  }
  animRing();
}

function checkTimecapAlerts(nm) {
  if (!state) return;
  const evNameById = Object.fromEntries((state.events || []).map((e) => [e.id, e.name || e.id]));
  const winMap = getEventWindowMap(state, nm);
  const byKey = new Map();
  Object.keys(TC_MILESTONES).forEach((evId) => {
    const milestones = TC_MILESTONES[evId];
    if (!milestones) return;
    (winMap[evId] || []).forEach(({ athlete, elapsed }) => {
      const elapsedMin = typeof elapsed === "number" && isFinite(elapsed) ? elapsed : 0;
      if (elapsedMin < 0) return;
      const name = (HyroxStore.formatTeamDisplayName(athlete) || "").trim() || (athlete.lastName || "");
      milestones.forEach((m) => {
        const secUntil = Math.round((m.at - elapsedMin) * 60);
        if (secUntil > 0 && secUntil <= TC_TRIGGER) {
          const id = `${evId}:${athlete.id}:${m.at}`;
          if (!byKey.has(id)) {
            byKey.set(id, {
              key: id,
              color: m.color,
              eventTitle: evNameById[evId] || evId,
              icon: m.icon,
              label: m.label,
              sub: m.sub,
              secRemaining: secUntil,
              athletes: name ? [name] : [],
            });
          } else if (name) {
            const g = byKey.get(id);
            if (g.athletes.indexOf(name) < 0) g.athletes.push(name);
          }
        }
      });
    });
  });
  byKey.forEach((info, key) => {
    if (!_tcAlerted.has(key)) {
      _tcAlerted.add(key);
      showTimecapAlert(info);
    }
  });
}

/* ── CLOCK (1 s) : état = cache, grille + chrono = temps réel, pas de patch partiel obsolète ─ */
function tickClock() {
  const d = new Date();
  const hdr = document.getElementById("hdrClock");
  if (hdr) hdr.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;

  state = HyroxStore.loadState();
  renderLiveGrid(state);
  renderTimeline(state);

  checkDepartures();
  checkTimecapAlerts(nowMin());
  checkArrivalPopups();
}

/* ── RENDER ALL ────────────────────────────────────────────────── */
let state=null;
let _cachedRanking=null; // calculé une seule fois par render

function render(){
  if(!state) return;
  _cachedRanking = HyroxStore.getRanking(state); // 1 seul calcul par cycle
  renderTicker(state);
  renderLiveGrid(state);
  renderLeaderboard(state);
  renderTimeline(state);
  startLiveScrollers();
}

/* ── INIT ──────────────────────────────────────────────────────── */
const TV_CLOUD_INIT_MS = 10000; // ne pas rester sur l’écran de chargement si le fetch cloud ne répond pas

async function init(){
  const fClose = document.getElementById("finish-close");
  if (fClose) fClose.addEventListener("click", () => hideArrivalPopup());
  window.addEventListener("resize", () => {
    const el = document.getElementById("finish-arrival");
    if (el && el.classList.contains("show")) _launchArrivalConfetti();
  });

  tickClock();
  setInterval(tickClock, 1000);
  /* Classement + fil d’info : moins fréquent que la grille (coût getRanking) */
  setInterval(render, 15000);

  try {
    try {
      await Promise.race([
        HyroxStore.whenCloudReady(),
        new Promise((_, reject) =>
          setTimeout(() => reject(new Error('cloud-timeout')), TV_CLOUD_INIT_MS)
        ),
      ]);
      state = HyroxStore.loadState();
      const hs = document.getElementById('hdrSync');
      if (hs) hs.textContent = 'Cloud · OK';
    } catch (e) {
      state = HyroxStore.loadState();
      const hs = document.getElementById('hdrSync');
      if (hs) {
        hs.textContent = (e && e.message === 'cloud-timeout') ? 'Réseau…' : 'Hors ligne';
      }
      // En cas de timeout, le pull initial peut encore finir en arrière-plan
      if (e && e.message === 'cloud-timeout') {
        HyroxStore.pullRemote()
          .then((next) => {
            state = next;
            const h = document.getElementById('hdrSync');
            if (h) h.textContent = 'Cloud · OK';
            suppressArrivalPopupsForCurrentFinishes();
            render();
          })
          .catch(() => {});
      }
    }

    // Nom + date de compétition dans le header
    const cfg = state?.config || {};
    const dateStr = cfg.date;
    let compLabel = cfg.competitionName || 'Hyrox Epicure';
    const hdrComp = document.getElementById('hdrComp');
    if (dateStr) {
      const d = new Date(dateStr + 'T12:00:00'); // midi pour éviter les décalages TZ
      const today = new Date().toISOString().slice(0,10);
      const isToday = today === dateStr;
      const fmtDate = d.toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short' });
      compLabel += ` · ${fmtDate}`;
      if (!isToday) {
        const isPast = today > dateStr;
        if (hdrComp) hdrComp.style.color = isPast ? '#888888' : '#C6FF00';
        compLabel += isPast ? ' (terminée)' : ' (à venir)';
      } else if (hdrComp) {
        hdrComp.style.color = '';
      }
    }
    if (hdrComp) hdrComp.textContent = compLabel;
    (function bootSnap(){
      const list = (state?.scores||[]).map(s=>({ t:s.teamId, e:s.eventId, v:scoreVal(s) }));
      list.sort((a,b)=>a.t.localeCompare(b.t)||a.e.localeCompare(b.e));
      prevScoreSnapshot = JSON.stringify(list);
    })();
  } catch (err) {
    console.error('[TV init]', err);
    if (!state) state = HyroxStore.loadState();
  } finally {
    const loader = document.getElementById('loader');
    const app = document.getElementById('app');
    if (loader) loader.classList.add('hidden');
    setTimeout(() => {
      if (loader) loader.style.display = 'none';
      if (app) app.style.display = 'grid';
    }, 600);
  }

  suppressArrivalPopupsForCurrentFinishes();
  render();

  setInterval(async()=>{
    try {
      const next = await HyroxStore.pullRemote();
      checkNewScores(next);
      state = next;
      const t = new Date();
      const hs = document.getElementById('hdrSync');
      if (hs) hs.textContent = `Cloud · ${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
      render();
    } catch (_) {
      const hs = document.getElementById('hdrSync');
      if (hs) hs.textContent = 'Erreur cloud';
    }
  }, 10000);
}

window.addEventListener('hyrox:remote-sync', e=>{
  if(e.detail.status!=='success') return;
  /* loadState() = cache de CET onglet : après un push depuis scores.html, il faut pull pour lire le cloud. */
  HyroxStore.pullRemote()
    .then((next) => {
      checkNewScores(next);
      state = next;
      render();
    })
    .catch(() => {});
});
window.addEventListener('DOMContentLoaded', init);
</script>
