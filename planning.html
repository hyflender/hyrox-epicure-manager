<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyrox Epicure - Planning Heats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="stylesheet" href="./assets/css/admin-bootstrap.css" />
    <style>
      /* ── Résumé (toutes largeurs) ─────────────────────────────── */
      .summary-grid {
        display: flex; flex-direction: column; gap: 8px;
        font-size: 14px; color: var(--muted); font-family: var(--mono);
        margin-bottom: 12px; padding: 12px; border-radius: 10px;
        background: rgba(255,255,255,.03); border: 1px solid var(--border);
      }
      @media (min-width: 576px) {
        .summary-grid { flex-direction: row; flex-wrap: wrap; gap: 16px; font-size: 12px; padding: 0; border: none; background: transparent; }
      }
      .summary-grid span strong { color: var(--text); }

      /* ══ VUE MOBILE — cartes athlètes (lisible doigt / téléphone) ══ */
      #planning-mobile { margin-bottom: 8px; }
      .pm-heat {
        margin-bottom: 20px; border-radius: 14px; overflow: hidden;
        border: 1px solid var(--border); background: var(--card);
        box-shadow: 0 2px 12px rgba(0,0,0,.2);
      }
      .pm-heat .heat-header {
        display: block; width: 100%;
        background: rgba(198,255,0,.1);
        color: var(--gold);
        font-family: var(--mono);
        font-size: 13px; font-weight: 800; letter-spacing: .06em;
        text-transform: uppercase; padding: 12px 14px;
        border: none; border-bottom: 1px solid rgba(198,255,0,.2);
        text-align: left; margin: 0;
      }
      .pm-heat.heat-past   .heat-header { opacity: .5; }
      .pm-heat.heat-active .heat-header { background: rgba(198,255,0,.2); }
      .pm-heat.heat-next   .heat-header { background: rgba(198,255,0,.07); }
      .pm-heat .heat-endnote { display: block; font-size: 11px; font-weight: 600; text-transform: none; color: var(--muted); margin-top: 4px; letter-spacing: 0; }
      .pm-ath {
        padding: 0 0 4px; border-bottom: 1px solid var(--border);
        background: rgba(0,0,0,.15);
      }
      .pm-ath:last-of-type { border-bottom: none; }
      tr.athlete-past, .pm-ath.athlete-past { opacity: .45; }
      tr.athlete-active, .pm-ath.athlete-active { background: rgba(198,255,0,.06); }
      .pm-ath-head { padding: 12px 14px 4px; }
      .pm-ath-name {
        font-size: 18px; font-weight: 800; line-height: 1.2;
        text-transform: uppercase; letter-spacing: .02em; word-wrap: break-word;
        color: #fff;
      }
      .pm-ath-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
      .pm-ath-meta .cat-badge { font-size: 10px; vertical-align: middle; }
      .pm-zones { padding: 0 8px 12px; }
      .pm-zone {
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        min-height: 48px; padding: 10px 10px; margin-bottom: 6px; border-radius: 10px;
        background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
        font-size: 15px; flex-wrap: wrap;
      }
      .pm-zone:last-child { margin-bottom: 0; }
      .pm-z-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
      .pm-z-num { font-family: var(--mono); font-size: 11px; font-weight: 800; color: var(--gold); }
      .pm-z-tit { font-size: 14px; font-weight: 700; line-height: 1.2; }
      .pm-z-scored .pm-z-tit { color: var(--text); }
      .pm-z-free  .pm-z-num { color: var(--muted); }
      .pm-z-time {
        font-family: var(--mono);
        font-size: 20px;
        font-weight: 800;
        flex-shrink: 0;
        color: var(--text);
      }
      .pm-z-stag { font-size: 10px; font-family: var(--mono); color: var(--faint); width: 100%; text-align: right; margin-top: -4px; }
      .pm-hint-legend {
        font-size: 12px; color: var(--muted); margin: 0 0 12px; padding: 10px; border-radius: 8px;
        background: rgba(255,255,255,.03); line-height: 1.4;
      }
      #live-status {
        font-family: var(--mono); color: var(--muted);
        display: flex; flex-wrap: wrap; align-items: center;
        font-size: 14px; gap: 10px; line-height: 1.4; margin-bottom: 10px;
      }
      @media (min-width: 768px) { #live-status { font-size: 12px; gap: 20px; } }

      .zone-legend { display: flex; flex-wrap: wrap; gap: 8px 10px; font-size: 12px; }
      .zone-legend-item { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 8px; background: rgba(0,0,0,.2); }
      @media (max-width: 767px) { .zone-legend { font-size: 13px; } }

      /* Zone cells — mêmes états .z-* sur table td et .pm-zone */
      .pm-zone.pulse-glow { animation: pulse-glow 1.6s ease-in-out infinite; }

      /* ── Table (md+) ───────────────────────────────────────────── */
      .planning-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .planning-table th, .planning-table td { padding: 7px 10px; white-space: nowrap; }
      .planning-table th { font-size: 11px; font-family: var(--mono); text-align: center; }
      .planning-table td { text-align: center; }
      .planning-table td.athlete-name { text-align: left; font-weight: 600; }
      .planning-table td.athlete-cat  { text-align: left; }

      /* Heat header (table) ─────────────────────────────────────── */
      tr.heat-header td {
        background: rgba(245,192,48,.08);
        color: var(--gold);
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: .07em;
        padding: 5px 10px;
        border-top: 1px solid rgba(245,192,48,.2);
        text-align: left;
      }
      tr.heat-header.heat-past   td { opacity: .4; }
      tr.heat-header.heat-active td { background: rgba(245,192,48,.18); border-top-color: var(--gold); }
      tr.heat-header.heat-next   td { background: rgba(245,192,48,.05); }

      /* ── Athlete rows (table) ─────────────────────────────────── */
      tr.athlete-past   { opacity: .35; }
      tr.athlete-active { background: rgba(245,192,48,.04); }

      /* ── Zone cells (horaires) — var(--text) : --foreground n’existe pas dans le thème */
      .zone-time {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text);
        font-weight: 600;
      }

      td.z-past    { color: var(--muted) !important; opacity: .45; }
      td.z-active  {
        color: var(--gold) !important;
        font-weight: 700;
        background: rgba(245,192,48,.12);
        border-radius: 4px;
      }
      td.z-soon    {
        color: #f5a623 !important;
        font-weight: 700;
        background: rgba(245,166,35,.08);
      }
      td.z-future  { color: var(--text) !important; }

      .pm-zone.z-past   { color: var(--muted) !important; opacity: .5; }
      .pm-zone.z-active {
        color: var(--gold) !important; font-weight: 700;
        background: rgba(245,192,48,.12);
        border-color: rgba(245,192,48,.4);
      }
      .pm-zone.z-soon   { color: #f5a623 !important; font-weight: 700; background: rgba(245,166,35,.1); }
      .pm-zone.z-future { color: var(--text) !important; }

      /* Clignotement pour la zone active */
      @keyframes pulse-glow {
        0%, 100% { box-shadow: inset 0 0 0 1px rgba(245,192,48,.5); }
        50%       { box-shadow: inset 0 0 0 2px rgba(245,192,48,.9), 0 0 8px rgba(245,192,48,.3); }
      }
      td.z-active, .pm-zone.z-active { animation: pulse-glow 1.6s ease-in-out infinite; }

      /* ── Zone header cols ──────────────────────────────────────── */
      .zone-scored-col   { color: var(--gold); }
      .zone-free-col     { color: var(--muted); }
      th.zh-active       { color: var(--gold) !important; font-weight: 700; border-bottom: 2px solid var(--gold); }

      .zone-dot-transition { background: var(--border-md); }
    </style>
  </head>
  <body>
    <script src="./assets/js/data.js"></script>
    <script>
      HyroxStore.redirectToCompetitionPickerIfUrlMissingComp();
    </script>
    <nav class="navbar navbar-expand-md navbar-dark border-bottom border-secondary admin-navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="./index.html"><span class="fw-bold">HYROX</span> <span class="text-secondary" style="font-size:0.88rem">· Athlètes</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#athleteNav" aria-controls="athleteNav" aria-expanded="false" aria-label="Menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="athleteNav">
          <ul class="navbar-nav ms-md-auto flex-wrap py-2 py-md-0">
            <li class="nav-item"><a class="nav-link" href="./portail.html">Portail</a></li>
            <li class="nav-item"><a class="nav-link active" href="./planning.html">Planning</a></li>
            <li class="nav-item"><a class="nav-link" href="./epreuves.html">Épreuves</a></li>
            <li class="nav-item"><a class="nav-link" href="./classement.html">Classement</a></li>
            <li class="nav-item"><a class="nav-link" href="./athlete.html">Mes résultats</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container-fluid px-2 px-sm-3 py-3 py-md-4">
      <section class="card">
        <div class="summary-grid">
          <span>Départ toutes les <strong id="interval">—</strong> min</span>
          <span><strong id="per-heat">—</strong> athlètes / heat</span>
          <span>Échauffement : <strong id="warmup-mins">—</strong> min avant chaque départ</span>
          <span>Premier départ : <strong id="start-time">—</strong></span>
          <span>1er échauff. dès <strong id="first-warmup">—</strong> <span style="font-size:11px;opacity:.75">(avant 1er heat)</span></span>
          <span><strong id="heat-count">—</strong> heats au total</span>
        </div>
        <div id="live-status">
          <span><span class="dot-live"></span> Temps réel</span>
          <span id="clock">—</span>
          <span id="next-up-label"></span>
        </div>
        <div id="planning-mobile" class="d-md-none">
          <div id="planning-mobile-body" class="pt-2"></div>
        </div>
        <div id="planning-desktop" class="d-none d-md-block table-responsive" style="overflow-x:auto">
          <table class="planning-table w-100">
            <thead id="planning-head"></thead>
            <tbody id="planning-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script>
      const thead       = document.querySelector("#planning-head");
      const tbody       = document.querySelector("#planning-tbody");
      const clockEl     = document.querySelector("#clock");
      const nextUpLabel = document.querySelector("#next-up-label");

      function parseHm(hm) {
        const [h, m] = String(hm || "08:00").split(":").map(Number);
        return (h || 0) * 60 + (m || 0);
      }
      function toHm(min) {
        const h = Math.floor(min / 60) % 24;
        const m = Math.floor(min) % 60;
        return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
      }
      /** Heure d’échauffement = départ − warmup (repli sur le créneau veille si heure négative). */
      function warmupStartMin(departureMin, warmupM) {
        const w = Math.max(0, Number(warmupM) || 0);
        let t = departureMin - w;
        if (t < 0) t += 24 * 60;
        return t;
      }
      function clockStr() {
        const d = new Date();
        return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
      }
      let _planningState = null;
      function nowMinutes() {
        return HyroxStore.effectiveNowMin(_planningState);
      }
      function fmtCountdown(diffMin) {
        const absMin = Math.abs(diffMin);
        const m = Math.floor(absMin);
        const s = Math.round((absMin - m) * 60);
        return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
      }

      // ── Données globales recalculées à chaque render ─────────────
      let scheduleCache  = [];
      let zonesCache     = [];
      let offsetsCache   = [];
      let warmupMinutesP = 30;

      function buildData() {
        const state    = HyroxStore.loadState();
        _planningState = state;
        scheduleCache  = HyroxStore.buildHeatSchedule(state);
        zonesCache     = [...state.events].sort((a, b) => a.order - b.order);
        offsetsCache   = [];
        let cum = 0;
        zonesCache.forEach((z) => { offsetsCache.push(cum); cum += (z.durationMinutes || 0); });
        warmupMinutesP = state.config.warmupMinutes != null ? Number(state.config.warmupMinutes) : 30;

        document.querySelector("#interval").textContent   = state.config.heatIntervalMinutes || 20;
        document.querySelector("#per-heat").textContent   = state.config.athletesPerHeat || 2;
        document.querySelector("#start-time").textContent = state.config.startTime || "08:00";
        document.querySelector("#heat-count").textContent = scheduleCache.length;
        document.querySelector("#warmup-mins").textContent = String(warmupMinutesP);
        if (scheduleCache.length > 0) {
          const firstDep = parseHm(scheduleCache[0].startTime);
          document.querySelector("#first-warmup").textContent = toHm(warmupStartMin(firstDep, warmupMinutesP));
        } else {
          document.querySelector("#first-warmup").textContent = "—";
        }

      }

      function buildTable() {
        thead.innerHTML = `<tr>
          <th style="text-align:left">Athlète</th>
          <th style="text-align:left">Cat.</th>
          <th>Heat</th>
          <th>Échauffement <span style="font-weight:400;opacity:.65;font-size:10px">(à partir de)</span></th>
          <th>Départ <span style="font-weight:400;opacity:.65;font-size:10px">(début parcours)</span></th>
        </tr>`;

        tbody.innerHTML = "";
        const st = _planningState;
        const cumEnd = zonesCache.reduce((s, z) => s + (z.durationMinutes || 0), 0);
        const estParc = st && st.config && st.config.estimatedParcoursMinutes != null
          ? Number(st.config.estimatedParcoursMinutes) : 90;
        const minutesAfterStart = cumEnd > 0 ? cumEnd : (estParc > 0 ? estParc : 90);
        scheduleCache.forEach((heat) => {
          const heatStart = parseHm(heat.startTime);
          const warmT = toHm(warmupStartMin(heatStart, warmupMinutesP));
          const heatEnd   = heatStart + minutesAfterStart;

          const heatTr = document.createElement("tr");
          heatTr.className = "heat-header heat-header-row";
          heatTr.dataset.heatStart = heatStart;
          heatTr.dataset.heatEnd   = heatEnd;
          heatTr.dataset.heatId    = heat.heat;
          heatTr.innerHTML = `<td colspan="5">
            Heat ${heat.heat} — <strong>Échauffement dès ${warmT}</strong> → <strong>Départ ${heat.startTime}</strong> <span style="font-weight:400;opacity:.6">(début de la course)</span>
          </td>`;
          tbody.appendChild(heatTr);

          heat.athletes.forEach((athlete) => {
            const name = HyroxStore.formatTeamDisplayName(athlete);
            const eff  = HyroxStore.effectiveCategory(athlete);
            const divL = HyroxStore.formatTeamDivisionLine(athlete);

            const tr = document.createElement("tr");
            tr.className = "athlete-row";
            tr.dataset.heatStart = heatStart;
            tr.dataset.heatEnd   = heatEnd;
            tr.innerHTML = `
              <td class="athlete-name">${name}</td>
              <td class="athlete-cat">
                <span class="cat-badge cat-${eff}">${divL}</span>
              </td>
              <td style="font-family:var(--mono);font-weight:700;color:var(--gold)">H${heat.heat}</td>
              <td class="zone-time" style="font-size:14px;font-weight:600;font-family:var(--mono);color:var(--muted)">${warmT}</td>
              <td class="zone-time" style="font-size:15px;font-weight:700;font-family:var(--mono);color:var(--gold)">${heat.startTime}</td>
            `;
            tbody.appendChild(tr);
          });
        });

        buildMobileView();
      }

      function buildMobileView() {
        const root = document.getElementById("planning-mobile-body");
        if (!root) return;
        root.innerHTML = "";

        const st2 = _planningState;
        const cumEnd2 = zonesCache.reduce((s, z) => s + (z.durationMinutes || 0), 0);
        const estParc2 = st2 && st2.config && st2.config.estimatedParcoursMinutes != null
          ? Number(st2.config.estimatedParcoursMinutes) : 90;
        const minutesAfterStart2 = cumEnd2 > 0 ? cumEnd2 : (estParc2 > 0 ? estParc2 : 90);
        scheduleCache.forEach((heat) => {
          const heatStart = parseHm(heat.startTime);
          const heatEnd   = heatStart + minutesAfterStart2;

          const section = document.createElement("section");
          section.className = "pm-heat heat-header-row";
          section.dataset.heatStart = String(heatStart);
          section.dataset.heatEnd = String(heatEnd);
          section.dataset.heatId = String(heat.heat);
          const head = document.createElement("div");
          head.className = "heat-header";
          const warmT = toHm(warmupStartMin(heatStart, warmupMinutesP));
          head.innerHTML = `Heat ${heat.heat} — <strong>Échauff. dès ${warmT}</strong> → <strong>Départ ${heat.startTime}</strong>`;
          section.appendChild(head);

          heat.athletes.forEach((athlete) => {
            const name = HyroxStore.formatTeamDisplayName(athlete);
            const eff  = HyroxStore.effectiveCategory(athlete);
            const divL = HyroxStore.formatTeamDivisionLine(athlete);

            const ath = document.createElement("div");
            ath.className = "pm-ath athlete-row";
            ath.dataset.heatStart = String(heatStart);
            ath.dataset.heatEnd = String(heatEnd);
            ath.innerHTML = `
              <div class="pm-ath-head">
                <div class="pm-ath-name athlete-name">${name}</div>
                <div class="pm-ath-meta">
                  <span class="cat-badge cat-${eff}">${divL}</span>
                  <span class="dep-mobile-pill" style="font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);margin-left:4px">🔥 ${warmT}</span>
                  <span class="dep-mobile-pill" style="font-family:var(--mono);font-size:12px;font-weight:800;color:var(--gold);margin-left:8px">⏱ ${heat.startTime}</span>
                </div>
              </div>`;
            section.appendChild(ath);
          });

          root.appendChild(section);
        });
      }

      // ── Mise à jour temps réel (chaque seconde) — vue « départ heat » seulement ──
      function tick() {
        const now = nowMinutes();
        clockEl.textContent = clockStr();

        // Heats (ligne d’en-tête + blocs .pm-heat)
        document.querySelectorAll(".heat-header-row").forEach((el) => {
          const hs = Number(el.dataset.heatStart);
          const he = Number(el.dataset.heatEnd);
          el.classList.remove("heat-past","heat-active","heat-next");
          if (now >= he)      el.classList.add("heat-past");
          else if (now >= hs) el.classList.add("heat-active");
          else                el.classList.add("heat-next");
        });

        // Lignes athlètes
        document.querySelectorAll("tr.athlete-row, .pm-ath.athlete-row").forEach((el) => {
          const hs = Number(el.dataset.heatStart);
          const he = Number(el.dataset.heatEnd);
          el.classList.remove("athlete-past","athlete-active");
          if (now >= he)      el.classList.add("athlete-past");
          else if (now >= hs) el.classList.add("athlete-active");
        });

        // Prochain départ de heat (début de course) — le plus tôt strictement après maintenant
        let nextHeatStart = Infinity;
        let firstAthleteInHeat = "";
        scheduleCache.forEach((heat) => {
          const hs = parseHm(heat.startTime);
          if (hs > now && hs < nextHeatStart) {
            nextHeatStart = hs;
            const a0 = heat.athletes && heat.athletes[0];
            firstAthleteInHeat = a0 ? HyroxStore.formatTeamDisplayName(a0) : "";
          }
        });

        if (nextHeatStart < Infinity) {
          const diff = nextHeatStart - now;
          const tStr = toHm(nextHeatStart);
          const who = firstAthleteInHeat ? ` <span style="opacity:.85">(ex. ${firstAthleteInHeat})</span>` : "";
          nextUpLabel.innerHTML = `<span class="next-up">⚡ Prochain <strong>départ ${tStr}</strong> dans ${fmtCountdown(diff)}${who}</span>`;
        } else {
          nextUpLabel.innerHTML = scheduleCache.length
            ? `<span style="color:var(--muted);font-size:12px">Tous les heats de la journée sont lancés (voir horaires ci-dessus).</span>`
            : "";
        }
      }

      let tickTimer = null;

      function render() {
        buildData();
        buildTable();
        tick();
        if (tickTimer) clearInterval(tickTimer);
        tickTimer = setInterval(tick, 1000);
      }

      HyroxStore.whenCloudReady()
        .then(() => render())
        .catch((err) => alert(`Cloud indisponible: ${err.message || err}`));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  </body>
</html>
